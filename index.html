<!DOCTYPE html>
<html>
<head>
<title>Evod AI Chat</title>

<style>

body{
  font-family: 'Segoe UI', sans-serif;
  background:#f4f7fc;
  margin:0;
}

.container{
  max-width:600px;
  margin:50px auto;
  background:white;
  padding:20px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  color:#2b7cff;
}

#chat{
  height:300px;
  overflow-y:auto;
  border:1px solid #eee;
  padding:10px;
  border-radius:10px;
  margin-bottom:10px;
}

.message-user{
  text-align:right;
  background:#2b7cff;
  color:white;
  padding:10px;
  border-radius:10px;
  margin:5px;
}

.message-ai{
  text-align:left;
  background:#eee;
  padding:10px;
  border-radius:10px;
  margin:5px;
}

#typing{
  font-size:12px;
  color:#999;
  margin-left:5px;
}

input{
  width:75%;
  padding:10px;
  border-radius:8px;
  border:1px solid #ddd;
}

button{
  padding:10px;
  border:none;
  background:#2b7cff;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

</style>

</head>

<body>

<div class="container">

<h1>Evod AI</h1>

<div id="chat"></div>
<div id="typing"></div>

<input id="msg" placeholder="Type a message...">
<button onclick="send()">Send</button>

</div>

<script>

async function send(){

let input = document.getElementById("msg");
let chat = document.getElementById("chat");
let typing = document.getElementById("typing");

let text = input.value.trim();

if(text==="") return;

// USER MESSAGE
chat.innerHTML += `<div class="message-user">${text}</div>`;
input.value = "";

// AUTO SCROLL
chat.scrollTop = chat.scrollHeight;

// SHOW TYPING
typing.innerText = "AI is typing...";

// SEND TO BACKEND
let res = await fetch("/reply", {
  method:"POST",
  headers:{
    "Content-Type":"application/json"
  },
  body: JSON.stringify({text:text})
});

let data = await res.json();

// REMOVE TYPING
typing.innerText = "";

// AI MESSAGE
chat.innerHTML += `<div class="message-ai">${data.reply}</div>`;

// AUTO SCROLL AGAIN
chat.scrollTop = chat.scrollHeight;

}

</script>

</body>
</html>
